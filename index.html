function revalidateCart(){
  for(let i=cart.length-1;i>=0;i--){if(cart[i].service)continue;const p=DB.products.find(x=>x.id===cart[i].id);const av=p?stockOf(p,saleWh):0;
    if(av<=0){cart.splice(i,1);continue;}cart[i].max=av;if(cart[i].qty>av)cart[i].qty=av;}
}
function saleScanAdd(code){
  const c=String(code).trim().toLowerCase();
  let p=DB.products.find(x=>(x.code||'').toLowerCase()===c)||DB.products.find(x=>(x.code||'').toLowerCase().includes(c));
  if(!p){toast('لا يوجد منتج بهذا الكود','err');return;}
  if(stockOf(p,saleWh)<=0){toast('المنتج نافد في '+whName(saleWh),'err');return;}
  invPick(p.id);
}
function invNew(){cart=[];_pickedId='';saleCustomer='';invPayments=[];invMin=false;editSaleId='';toast('فاتورة جديدة','ok');render();}
function invSave(){
  if(!cart.length){toast('الفاتورة فارغة','err');return;}
  const editing=editSaleId?DB.sales.find(s=>s.id===editSaleId):null;
  if(editing)reverseSale(editing); // إلغاء أثر الفاتورة القديمة قبل إعادة الاحتساب
  const net=invNet();const profit=invProfit();
  const paid=invEffPaid();
  const remaining=Math.max(0,net-paid);
  let cust=null;
  if(invType==='credit'){
    cust=DB.customers.find(c=>c.id===saleCustomer);
    if(!cust){toast('البيع الآجل يتطلب اختيار عميل','err');if(editing)reapplySale(editing);return;}
  }
  const balBefore=cust?(cust.balance||0):0;
  // خصم كل بند من مخزنه الخاص (الخدمات لا تُخصم)
  const _aff=[];
  cart.forEach(l=>{if(l.service)return;const p=DB.products.find(x=>x.id===l.id);if(p){const w=l.wh||saleWh;ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-l.qty);p.qty=stockSum(p);if(!_aff.includes(p))_aff.push(p);}});
  const no=editing?editing.no:DB.seq.sale++;
  const whset=[...new Set(cart.filter(l=>!l.service).map(l=>l.wh||saleWh))];
  const invWhName=whset.length>1?'متعدّد المخازن':whName(whset[0]||saleWh);
  const payments=invType==='credit'?invPayments.slice():[{amount:Math.min(paid,net),date:todayISO(),note:'نقدي'}];
  const sale={id:editing?editing.id:uid('inv'),no,type:invType,date:editing?editing.date:((val('invDate')||todayISO())+'T'+new Date().toISOString().slice(11)),
    customerId:cust?cust.id:'',customerName:cust?cust.name:(boxName(saleBox)||'نقدي'),warehouseId:saleWh,warehouseName:invWhName,
    boxId:saleBox,boxName:boxName(saleBox),
    items:cart.map(l=>{const c=lineCalc(l);return{id:l.id,name:l.name,code:l.code,unit:l.unit,price:l.price,qty:l.qty,disc:l.disc||0,total:c.total,service:!!l.service,note:l.note||'',wh:l.service?'':(l.wh||saleWh),warehouseName:l.service?'':whName(l.wh||saleWh)};}),
    subtotal:cart.reduce((a,l)=>a+lineCalc(l).gross,0),discount:cart.reduce((a,l)=>a+lineCalc(l).disc,0),
    total:net,paid:paid,remaining,profit,payments,balanceBefore:balBefore,balanceAfter:balBefore+(net-paid)};
  if(editing){sale.editedBy=(typeof CUR_USER!=='undefined'&&CUR_USER&&CUR_USER.name)?CUR_USER.name:'مستخدم';sale.editedAt=new Date().toISOString();const ix=DB.sales.findIndex(s=>s.id===editing.id);DB.sales[ix]=sale;}
  else DB.sales.push(sale);
  if(cust)cust.balance=balBefore+(net-paid);
  if(invType==='credit'){payments.forEach(p=>{const pa=Number(p.amount)||0;if(pa>0)addCash('in',pa,(editing?'تعديل دفعة فاتورة #':'دفعة فاتورة آجلة #')+no,sale.id,p.box||saleBox);});}
  else if(paid>0)addCash('in',paid,(editing?'تعديل فاتورة #':'بيع نقدي #')+no,sale.id,saleBox);
  save();_aff.forEach(p=>cloudPutProduct(p));
  editSaleId='';cart=[];saleCustomer='';_pickedId='';invPayments=[];invMin=false;
  toast(editing?('تم تعديل الفاتورة #'+no):('تم حفظ الفاتورة #'+no),'ok');
  showInvoice(sale);
  render();
}
function editSale(id){
  const s=DB.sales.find(x=>x.id===id);if(!s){toast('الفاتورة غير موجودة','err');return;}
  closeModal();
  cart=(s.items||[]).map(it=>({id:it.id,name:it.name,code:it.code,unit:it.unit,price:it.price,qty:Number(it.qty)||0,disc:Number(it.disc)||0,note:it.note||'',service:!!it.service,wh:it.service?'':(it.wh||whIdByName(it.warehouseName)||s.warehouseId||defWh()),max:1e9}));
  saleCustomer=s.customerId||'';invType=s.type||'cash';
  saleWh=(s.warehouseId&&(DB.warehouses||[]).some(w=>w.id===s.warehouseId))?s.warehouseId:defWh();
  saleBox=(s.boxId&&boxes().some(b=>b.id===s.boxId))?s.boxId:defBox();
  invPayments=(s.type==='credit'&&s.payments)?s.payments.map(p=>({amount:Number(p.amount)||0,date:p.date||todayISO(),note:p.note||''})):[];
  editSaleId=id;invMin=false;
  toast('تعديل الفاتورة #'+s.no,'ok');go('sale');
}
function invoiceBodyHTML(sale){
  const isCredit=sale.type==='credit';
  const cell='padding:7px 6px;text-align:center;border:1px solid #B6C2D2;color:#000';
  const rows=sale.items.map((i,n)=>`<tr style="background:${n%2?'#F8FAFC':'#ffffff'}">
      <td style="${cell};color:#334155">${n+1}</td>
      <td style="${cell};text-align:right;font-weight:600">${esc(i.name)}${i.note?`<div style="font-size:10.5px;color:#475569">${esc(i.note)}</div>`:''}</td>
      <td style="${cell}">${esc(i.code||'—')}</td>
      <td style="${cell};font-weight:700;font-size:13.5px;white-space:nowrap">${money(i.qty)}</td>
      <td style="${cell}">${esc(i.unit||'—')}</td>
      <td style="${cell}">${esc(i.warehouseName||'—')}</td>

function loadHtml2Canvas(cb){
  if(window.html2canvas)return cb(true);
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  s.onload=()=>cb(!!window.html2canvas);s.onerror=()=>cb(false);
  document.head.appendChild(s);
}
function invoiceImage(sale,cb){
  loadHtml2Canvas(ok=>{
    if(!ok){cb(null);return;}
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-10000px;top:0;width:720px;background:#fff;padding:18px;z-index:-1';
    wrap.setAttribute('dir','rtl');
    wrap.innerHTML=invoiceBodyHTML(sale);
    document.body.appendChild(wrap);
    const target=wrap.firstElementChild||wrap;
    const done=cv=>{try{wrap.remove();}catch(e){}cb(cv);};
    setTimeout(()=>{
      window.html2canvas(target,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false})
        .then(cv=>done(cv)).catch(()=>done(null));
    },120);
  });
}
function invoiceCanvas(sale){
  const W=620,pad=26,rowH=28,items=sale.items||[];
  const H=pad+70+54+34+items.length*rowH+30+120+pad;
  const sc=2;const cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  const ctx=cv.getContext('2d');ctx.scale(sc,sc);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  ctx.direction='rtl';const RX=W-pad;let y=pad+24;
  ctx.textAlign='center';ctx.fillStyle='#1D4ED8';ctx.font='bold 22px sans-serif';
  ctx.fillText(DB.settings.name||'مؤسسة الصداقة للتجارة العامة',W/2,y);y+=22;
  ctx.fillStyle='#64748b';ctx.font='13px sans-serif';
  ctx.fillText(sale.type==='credit'?'فاتورة بيع آجل':'فاتورة بيع نقدي',W/2,y);y+=26;
  ctx.textAlign='right';ctx.fillStyle='#0f172a';ctx.font='13px sans-serif';
  ctx.fillText(`فاتورة #${sale.no}    التاريخ: ${fmtDate(sale.date)}`,RX,y);y+=20;
  ctx.fillText(`العميل: ${sale.customerName||''}`,RX,y);y+=14;
  ctx.strokeStyle='#e2e8f0';ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();y+=22;
  ctx.font='bold 12px sans-serif';ctx.fillStyle='#334155';
  ctx.textAlign='right';ctx.fillText('المادة',RX,y);
  ctx.textAlign='center';ctx.fillText('كمية',W*0.40,y);ctx.fillText('سعر',W*0.26,y);
  ctx.textAlign='left';ctx.fillText('الإجمالي',pad,y);y+=8;
  ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();y+=20;
  ctx.font='13px sans-serif';ctx.fillStyle='#0f172a';
  items.forEach((i,n)=>{let nm=`${n+1}. ${i.name}`;if(nm.length>34)nm=nm.slice(0,33)+'…';
    ctx.textAlign='right';ctx.fillText(nm,RX,y);
    ctx.textAlign='center';ctx.fillText(money(i.qty),W*0.40,y);ctx.fillText(money(i.price),W*0.26,y);
    ctx.textAlign='left';ctx.fillText(money(i.total!=null?i.total:i.price*i.qty),pad,y);y+=rowH;});
  y+=4;ctx.strokeStyle='#cbd5e1';ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();y+=24;
  ctx.textAlign='right';ctx.font='bold 15px sans-serif';ctx.fillStyle='#0f172a';
  ctx.fillText(`الصافي: ${money(sale.total)} ${CUR()}`,RX,y);y+=22;
  ctx.font='13px sans-serif';ctx.fillStyle='#0f172a';
  ctx.fillText(`المدفوع: ${money(sale.paid)} ${CUR()}`,RX,y);y+=20;
  if(sale.remaining>0){ctx.fillStyle='#dc2626';ctx.fillText(`المتبقّي: ${money(sale.remaining)} ${CUR()}`,RX,y);}
  return cv;
}
function waInvoice(sale){
  let phone='',bal=null;if(sale.customerId){const c=DB.customers.find(x=>x.id===sale.customerId);if(c){phone=custWa(c);bal=c.balance;}}
  const txt=waInvoiceText(sale,bal);
  const openChat=()=>waOpen(phone,txt);
  const shareBlob=(blob)=>{
    if(!blob){openChat();return;}
    const file=new File([blob],`فاتورة-${sale.no}.png`,{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:txt}).catch(()=>openChat());
    }else{
      const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=file.name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),4000);
      toast('حُفظت صورة الفاتورة — أرفقها في محادثة واتساب','ok');openChat();
    }
  };
  toast('جارٍ تجهيز صورة الفاتورة...','ok');
  // الصورة الحقيقية الملوّنة لتصميم الفاتورة
  invoiceImage(sale,cv=>{
    if(cv&&cv.toBlob){cv.toBlob(b=>shareBlob(b),'image/png');return;}
    // احتياطي: الصورة المرسومة يدوياً إن تعذّر تحميل أداة التصوير
    let fb=null;try{fb=invoiceCanvas(sale);}catch(e){}
    if(fb&&fb.toBlob){fb.toBlob(b=>shareBlob(b),'image/png');}else openChat();
  });
}

function purSave(){
  if(!pcart.length){toast('لا مواد في الفاتورة','err');return;}
  const sup=DB.suppliers.find(s=>s.id===purchSupplier);if(!sup){toast('اختر المورد','err');return;}
  const editing=editPurId?DB.purchases.find(p=>p.id===editPurId):null;
  if(editing)reversePurchase(editing);
  const net=purNet();const paid=purEffPaid();const remaining=Math.max(0,net-paid);
  // إضافة المخزون للمستودع المختار وتحديث سعر الجملة
  const _aff=[];
  pcart.forEach(l=>{const p=DB.products.find(x=>x.id===l.id);if(p){const w=l.wh||purWh;ensureStock(p);p.stock[w]=(Number(p.stock[w])||0)+l.qty;p.qty=stockSum(p);if(Number(l.cost)>0)p.wholesale=l.cost;if(!_aff.includes(p))_aff.push(p);}});
  const no=editing?editing.no:DB.seq.purchase++;
  const whset=[...new Set(pcart.map(l=>l.wh||purWh))];
  const payments=purType==='credit'?purPayments.slice():[{amount:Math.min(paid,net),date:todayISO(),note:'نقدي'}];
  const purch={id:editing?editing.id:uid('pur'),no,type:purType,date:editing?editing.date:((val('purDate')||todayISO())+'T'+new Date().toISOString().slice(11)),

    boxId:purBox,boxName:boxName(purBox),
    items:pcart.map(l=>{const c=pLineCalc(l);return{id:l.id,name:l.name,code:l.code,unit:l.unit,cost:l.cost,qty:l.qty,disc:l.disc||0,total:c.total,note:l.note||'',wh:l.wh||purWh,warehouseName:whName(l.wh||purWh)};}),
    subtotal:pcart.reduce((a,l)=>a+pLineCalc(l).gross,0),discount:pcart.reduce((a,l)=>a+pLineCalc(l).disc,0),
    total:net,paid:paid,remaining,payments};
  if(editing){purch.editedBy=(typeof CUR_USER!=='undefined'&&CUR_USER&&CUR_USER.name)?CUR_USER.name:'مستخدم';purch.editedAt=new Date().toISOString();const ix=DB.purchases.findIndex(p=>p.id===editing.id);DB.purchases[ix]=purch;}
  else DB.purchases.push(purch);
  sup.balance=(sup.balance||0)+(net-paid);
  if(paid>0)addCash('out',paid,(editing?'تعديل شراء #':'فاتورة شراء #')+no+' - '+sup.name,purch.id,purBox);
  _aff.forEach(p=>{if(typeof cloudPutProduct==='function')cloudPutProduct(p);});
  editPurId='';save();pcart=[];purPayments=[];_pPicked='';purMin=false;
  toast(editing?('تم تعديل فاتورة الشراء #'+no):('تم حفظ فاتورة الشراء #'+no),'ok');showPurchase(purch);render();
}

    const up=()=>{document.removeEventListener('pointermove',mv);document.removeEventListener('pointerup',up);};

function customerStatement(id){
  const c=DB.customers.find(x=>x.id===id);if(!c)return;

  const pays=(DB.custPays||[]).filter(p=>p.custId===id);
  const totalBuy=invoices.reduce((a,s)=>a+s.total,0);
  const totalPaid=invoices.reduce((a,s)=>a+s.paid,0)+pays.reduce((a,p)=>a+(Number(p.amount)||0),0);
  // حركة زمنية موحّدة برصيد جاري
  const entries=[];
  invoices.forEach(s=>entries.push({date:s.date,debit:s.total,credit:s.paid,label:'فاتورة #'+s.no+(s.type==='credit'?' (آجل)':' (نقدي)')}));
  pays.forEach(p=>{const a=Number(p.amount)||0;entries.push({date:p.date,debit:a<0?-a:0,credit:a>0?a:0,label:(a>=0?'تحصيل دفعة':'صرف/إرجاع')+(p.note?(' — '+p.note):'')+' · '+boxName(p.box||defBox())});});
  entries.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const netEffect=entries.reduce((a,e)=>a+(e.debit-e.credit),0);
  let running=(c.balance||0)-netEffect;const opening=running;
  const ledger=entries.map(e=>{running+=(e.debit-e.credit);return `<tr><td class="muted" style="white-space:nowrap">${fmtDate(e.date)}</td><td style="text-align:right">${esc(e.label)}</td><td class="t-num">${e.debit?money(e.debit):'—'}</td><td class="t-num">${e.credit?money(e.credit):'—'}</td><td class="t-num"><b style="color:${running>0?'var(--danger)':running<0?'var(--success)':'inherit'}">${money(running)}</b></td></tr>`;}).join('');
  const tel=c.phone?('+'+(c.cc||'222')+' '+c.phone):'—';
  modal({title:'كشف حساب: '+esc(c.name),size:'lg',body:`
    <div id="stmt">

    </div>
    <div class="cards" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="card stat"><span class="label">إجمالي المشتريات</span><div class="val t-num" style="font-size:18px">${m(totalBuy)}</div></div>
      <div class="card stat"><span class="label">إجمالي المدفوع</span><div class="val t-num" style="font-size:18px;color:var(--success)">${m(totalPaid)}</div></div>
      <div class="card stat"><span class="label">${c.balance<0?'رصيد دائن له':'الرصيد المستحقّ'}</span><div class="val t-num" style="font-size:18px;color:${c.balance>0?'var(--danger)':'var(--success)'}">${m(Math.abs(c.balance||0))}</div></div>
    </div>
    <b style="font-size:13px">الحركة (مدين / دائن / الرصيد الجاري)</b>
    <table style="border:1px solid var(--line);margin-top:4px">
      <thead><tr><th>التاريخ</th><th>البيان</th><th>مدين (عليه)</th><th>دائن (له/مدفوع)</th><th>الرصيد</th></tr></thead>
      <tbody>
        <tr style="background:var(--surface-2,#f1f5f9)"><td class="muted">—</td><td style="text-align:right;font-weight:700">رصيد افتتاحي</td><td class="t-num">—</td><td class="t-num">—</td><td class="t-num"><b>${money(opening)}</b></td></tr>
        ${ledger||''}
        <tr style="background:var(--primary-soft)"><td></td><td style="text-align:right;font-weight:800">الرصيد الحالي</td><td></td><td></td><td class="t-num"><b style="color:${c.balance>0?'var(--danger)':'var(--success)'}">${money(c.balance||0)}</b></td></tr>
      </tbody>

    </div>`,

      {label:'تسجيل دفعة',primary:true,fn:()=>{collectPayment(id);return true;}},

    ]});
}

function saveVoucher(kind){
  const ptype=val('vc_ptype');const amt=parseFloat(val('vc_amt'))||0;
  if(amt<=0){toast('أدخل مبلغاً صحيحاً','err');return false;}
  const box=val('vc_box');const date=val('vc_date')||todayISO();const note=(val('vc_note')||'').trim();
  let partyId='',partyName='';
  if(ptype==='other'){partyName=(val('vc_party')||'').trim()||'حساب آخر';}
  else{partyId=val('vc_party')||'';if(!partyId){toast('اختر الطرف','err');return false;}}
  const no=DB.seq.voucher++;
  const vch={id:uid('vch'),no,kind,partyType:ptype,partyId,partyName,amount:amt,box,date:date+'T'+new Date().toISOString().slice(11),note};
  DB.vouchers.push(vch);
  // أثر الصندوق
  addCash(kind==='receipt'?'in':'out',amt,(kind==='receipt'?'سند قبض #':'سند دفع #')+no+(note?(' — '+note):''),vch.id,box);
  // أثر حساب الطرف
  if(ptype==='customer'){const c=DB.customers.find(x=>x.id===partyId);if(c){
    c.balance=(c.balance||0)+(kind==='receipt'?-amt:amt);
    DB.custPays.push({id:uid('cp'),custId:c.id,amount:(kind==='receipt'?amt:-amt),date,note:note||(kind==='receipt'?'سند قبض':'سند دفع'),box,voucher:vch.id});
  }}
  else if(ptype==='supplier'){const s=DB.suppliers.find(x=>x.id===partyId);if(s){
    s.balance=(s.balance||0)+(kind==='receipt'?amt:-amt);
  }}
  save();toast(kind==='receipt'?'تم تسجيل سند القبض':'تم تسجيل سند الدفع','ok');
  voucherPrint(vch.id);render();return true;
}
function delVoucher(id){
  const v=DB.vouchers.find(x=>x.id===id);if(!v)return;
  confirmDlg('حذف السند #'+v.no+'؟','سيُعكس أثره على الصندوق وحساب الطرف.',()=>{
    // عكس الصندوق
    addCash(v.kind==='receipt'?'out':'in',v.amount,'إلغاء سند #'+v.no,v.id,v.box);
    if(v.partyType==='customer'){const c=DB.customers.find(x=>x.id===v.partyId);if(c)c.balance=(c.balance||0)+(v.kind==='receipt'?v.amount:-v.amount);
      DB.custPays=DB.custPays.filter(p=>p.voucher!==v.id);}
    else if(v.partyType==='supplier'){const s=DB.suppliers.find(x=>x.id===v.partyId);if(s)s.balance=(s.balance||0)+(v.kind==='receipt'?-v.amount:v.amount);}
    DB.vouchers=DB.vouchers.filter(x=>x.id!==id);
    save();toast('تم حذف السند','ok');render();
  });
}

    if(mn===null&&mx===null)return true;
    if(mn!==null&&mx!==null)return v>=Math.min(mn,mx)&&v<=Math.max(mn,mx);
    if(mn!==null)return Math.abs(v-mn)<0.5; // مبلغ محدّد

/* ---------- سلة المحذوفات + دليل الهاتف ---------- */
function whIdByName(name){const w=(DB.warehouses||[]).find(x=>x.name===name);return w?w.id:null;}
function findProd(it){return (it.id&&DB.products.find(p=>p.id===it.id))||(it.code&&DB.products.find(p=>p.code===it.code))||DB.products.find(p=>p.name===it.name)||null;}
function lineWh(it,doc){return it.wh||whIdByName(it.warehouseName)||doc.warehouseId||defWh();}
function reverseSale(s){
  (s.items||[]).forEach(it=>{if(it.service)return;const p=findProd(it);if(p){const w=lineWh(it,s);ensureStock(p);p.stock[w]=(Number(p.stock[w])||0)+(Number(it.qty)||0);p.qty=stockSum(p);cloudPutProduct(p);}});
  if(s.customerId){const c=DB.customers.find(x=>x.id===s.customerId);if(c)c.balance=(c.balance||0)-((s.total||0)-(s.paid||0));}
  DB.cash=DB.cash.filter(m=>m.ref!==s.id);
}
function reapplySale(s){
  (s.items||[]).forEach(it=>{if(it.service)return;const p=findProd(it);if(p){const w=lineWh(it,s);ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-(Number(it.qty)||0));p.qty=stockSum(p);cloudPutProduct(p);}});
  if(s.customerId){const c=DB.customers.find(x=>x.id===s.customerId);if(c)c.balance=(c.balance||0)+((s.total||0)-(s.paid||0));}
  if(s.paid>0)addCash('in',s.paid,'استرجاع فاتورة #'+s.no,s.id,s.boxId);
}
function reversePurchase(p0){
  (p0.items||[]).forEach(it=>{const p=findProd(it);if(p){const w=lineWh(it,p0);ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-(Number(it.qty)||0));p.qty=stockSum(p);cloudPutProduct(p);}});
  if(p0.supplierId){const s=DB.suppliers.find(x=>x.id===p0.supplierId);if(s)s.balance=(s.balance||0)-((p0.total||0)-(p0.paid||0));}
  DB.cash=DB.cash.filter(m=>m.ref!==p0.id);
}
function reapplyPurchase(p0){
  (p0.items||[]).forEach(it=>{const p=findProd(it);if(p){const w=lineWh(it,p0);ensureStock(p);p.stock[w]=(Number(p.stock[w])||0)+(Number(it.qty)||0);p.qty=stockSum(p);cloudPutProduct(p);}});
  if(p0.supplierId){const s=DB.suppliers.find(x=>x.id===p0.supplierId);if(s)s.balance=(s.balance||0)+((p0.total||0)-(p0.paid||0));}
  if(p0.paid>0)addCash('out',p0.paid,'استرجاع شراء #'+p0.no,p0.id,p0.boxId);
}
function deleteSale(id){
  const i=DB.sales.findIndex(s=>s.id===id);if(i<0){toast('الفاتورة غير موجودة','err');return;}
  const s=DB.sales[i];
  confirmDlg('حذف الفاتورة #'+s.no+'؟','ستنتقل إلى سلة المحذوفات ويمكنك استرجاعها لاحقاً. سيُعاد المخزون ويُعدَّل رصيد الزبون.',()=>{
    reverseSale(s);DB.sales.splice(i,1);
    DB.trash.push({tid:uid('tr'),kind:'sale',deletedAt:new Date().toISOString(),data:s});
    save();closeModal();toast('نُقلت إلى سلة المحذوفات','ok');render();
  });
}
function deletePurchase(id){
  const i=DB.purchases.findIndex(p=>p.id===id);if(i<0){toast('غير موجودة','err');return;}
  const p0=DB.purchases[i];
  confirmDlg('حذف فاتورة الشراء #'+p0.no+'؟','ستنتقل إلى سلة المحذوفات. سيُخصم المخزون ويُعدَّل رصيد المورد.',()=>{
    reversePurchase(p0);DB.purchases.splice(i,1);
    DB.trash.push({tid:uid('tr'),kind:'purchase',deletedAt:new Date().toISOString(),data:p0});
    save();closeModal();toast('نُقلت إلى سلة المحذوفات','ok');render();
  });
}
function restoreTrash(tid){
  const i=(DB.trash||[]).findIndex(t=>t.tid===tid);if(i<0)return;const t=DB.trash[i];
  if(t.kind==='sale'){reapplySale(t.data);DB.sales.push(t.data);}
  else if(t.kind==='purchase'){reapplyPurchase(t.data);DB.purchases.push(t.data);}
  DB.trash.splice(i,1);save();toast('تم الاسترجاع','ok');render();trashView();
}
function purgeTrash(tid){
  confirmDlg('حذف نهائي؟','لا يمكن التراجع بعد الحذف النهائي.',()=>{DB.trash=(DB.trash||[]).filter(t=>t.tid!==tid);save();toast('حُذف نهائياً','ok');trashView();});
}

  if(!(DB.trash||[]).length){toast('السلة فارغة','ok');return;}
  confirmDlg('تفريغ السلة نهائياً؟','سيُحذف كل ما في السلة نهائياً ولا يمكن استرجاعه.',()=>{DB.trash=[];save();toast('تم تفريغ السلة','ok');trashView();});

function convertOrder(id){
  const o=(DB.orders||[]).find(x=>x.id===id);if(!o)return;
  confirmDlg('تحويل الطلب إلى فاتورة؟','سيُنشأ بيع جديد، ويُخصم المخزون، وتُسجّل الدفعة في الصندوق.',()=>{
    const wh='wh_main';
    const items=o.items.map(l=>{const p=DB.products.find(x=>x.id===l.id);const price=Number(l.price)||0,qty=Number(l.qty)||0;
      return {id:l.id,name:l.name,code:p?(p.code||''):'',unit:p?(p.unit||'قطعة'):'قطعة',price,qty,disc:0,total:price*qty,wh,warehouseName:whName(wh),cost:p?(p.wholesale||0):0};});
    if(o.delivery>0)items.push({id:'svc_deliv',name:'الحمل (توصيل)',unit:'خدمة',price:o.delivery,qty:1,disc:0,total:o.delivery,service:true,wh,warehouseName:whName(wh),cost:0});
    const subtotal=items.reduce((a,i)=>a+i.total,0);const total=subtotal;
    const paid=o.payMode==='cod'?0:(Number(o.deposit)||0);const remaining=total-paid;
    let cust=DB.customers.find(c=>digitsOnly(c.phone)===digitsOnly(o.phone)&&(c.cc||'222')===(o.cc||'222'));
    if(!cust&&remaining>0){cust={id:uid('c'),name:o.name,cc:o.cc||'222',phone:o.phone,phone2:'',fax:'',address:o.addr||'',image:'',balance:0};DB.customers.push(cust);}
    const type=remaining>0?'credit':'cash';
    const boxId=o.payAppId||defBox();
    if(DB.seq&&!DB.seq.sale)DB.seq.sale=1;const no=DB.seq.sale;DB.seq.sale++;
    const profit=items.reduce((a,i)=>a+(i.service?0:((i.price-(i.cost||0))*i.qty)),0);
    const sale={id:uid('inv'),no,type,date:new Date().toISOString(),
      customerId:cust?cust.id:'',customerName:cust?cust.name:o.name,warehouseId:wh,warehouseName:whName(wh),boxId,boxName:boxName(boxId),
      items,subtotal,discount:0,total,paid,remaining,profit,
      payments:paid>0?[{amount:paid,date:todayISO(),note:'دفعة طلب #'+o.no+(o.payApp?(' عبر '+o.payApp):''),box:boxId,boxName:boxName(boxId)}]:[],
      source:'order',orderId:o.id};
    items.forEach(it=>{if(it.service)return;const p=DB.products.find(x=>x.id===it.id);if(p){p.qty=(Number(p.qty)||0)-it.qty;if(!p.stock)p.stock={};p.stock[wh]=(Number(p.stock[wh])||0)-it.qty;cloudPutProduct(p);}});
    DB.sales.push(sale);
    if(cust&&remaining>0)cust.balance=(Number(cust.balance)||0)+remaining;

function pickAnnImg(input){const f=input.files[0];if(!f)return;downscaleImage(f,uri=>{if(!uri){toast('تعذّر قراءة الصورة','err');return;}_annImg=uri;const p=document.getElementById('an_imgPrev');if(p){p.style.backgroundImage=`url(${uri})`;p.innerHTML='';}});input.value='';}
function publishAnnouncement(){
  const title=(val('an_title')||'').trim();const body=(val('an_body')||'').trim();
  if(!title&&!body){toast('اكتب عنواناً أو نصاً','err');return;}
  const a={id:uid('ann'),title,body,image:_annImg||'',date:new Date().toISOString(),active:true};
  cloudAddAnnouncement(a).then(()=>toast('تم نشر الإشعار للزبائن','ok')).catch(()=>toast('تعذّر النشر — تحقّق من الإنترنت','err'));
  _annCache=[a,...(_annCache||[])];
  const el=document.getElementById('annList');if(el)el.innerHTML=annListHtml(_annCache);
  const ti=document.getElementById('an_title');if(ti)ti.value='';const bo=document.getElementById('an_body');if(bo)bo.value='';_annImg=null;
  const p=document.getElementById('an_imgPrev');if(p){p.style.backgroundImage='';p.innerHTML=svg(I.upload,18)+' <span style="margin-inline-start:6px">إرفاق صورة</span>';}
}
function annRefresh(){
  const fill=list=>{_annCache=(list||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));const el=document.getElementById('annList');if(el)el.innerHTML=annListHtml(_annCache);};
  const p=cloudFetchAnnouncements();
  if(p&&p.then)p.then(list=>{if(list===null)fill(window._ann||_annCache||[]);else fill(list);}).catch(()=>fill(_annCache||[]));

function annListHtml(list){

/* ---------- استيراد/تصدير CSV / Excel ---------- */
function importRows(rows){
  let added=0,updated=0;
  const isHeader=rows.length&&/[a-zA-Zأ-ي]/.test(String(rows[0][0]||''))&&isNaN(parseFloat(rows[0][3]));
  for(let i=isHeader?1:0;i<rows.length;i++){
    const c=rows[i].map(x=>String(x==null?'':x).trim());
    if(!c[0])continue;
    const code=c[1]||'',nameN=normAr(c[0]);
    const category=c[2]||DB.categories[0],price=parseFloat(c[3])||0,wholesale=parseFloat(c[4])||0,qty=parseFloat(c[5])||0,minQty=parseFloat(c[6])||5,desc=c[7]||'';
    let ex=code?DB.products.find(p=>p.code&&p.code.trim().toLowerCase()===code.toLowerCase()):null;
    if(!ex)ex=DB.products.find(p=>normAr(p.name)===nameN);
    if(ex){
      ex.name=c[0];if(code)ex.code=code;ex.category=category;
      if(c[3]!=='')ex.price=price;if(c[4]!=='')ex.wholesale=wholesale;if(c[5]!=='')ex.qty=qty;if(c[6]!=='')ex.minQty=minQty;if(desc)ex.desc=desc;
      cloudPutProduct(ex);updated++;
    }else{
      const np={id:uid('p'),name:c[0],code,category,price,wholesale,qty,minQty,desc};
      DB.products.push(np);cloudPutProduct(np);added++;
    }
    if(c[2]&&!DB.categories.includes(c[2]))DB.categories.push(c[2]);
  }
  if(!added&&!updated){toast('لم يتم العثور على مواد في الملف','err');return;}
  save();cloudPutMeta();toast(`تم الاستيراد: ${added} جديدة، ${updated} محدّثة`,'ok');render();
}
function findDuplicates(){
  const map={};
  DB.products.forEach(p=>{const key=(p.code&&p.code.trim())?('c:'+p.code.trim().toLowerCase()):('n:'+normAr(p.name));(map[key]=map[key]||[]).push(p);});
  return Object.values(map).filter(g=>g.length>1);
}
function dedupeProducts(){
  const groups=findDuplicates();
  if(!groups.length){toast('لا توجد مواد مكرّرة 👍','ok');return;}
  const extra=groups.reduce((a,g)=>a+(g.length-1),0);
  confirmDlg('دمج المواد المكرّرة؟',`وُجدت ${groups.length} مادة مكرّرة (${extra} نسخة زائدة). سيُحتفظ بنسخة واحدة من كل مادة وتُجمع كمياتها، وتُحذف النسخ الزائدة.`,()=>{
    let removed=0;
    groups.forEach(g=>{
      const keep=g[0];let qty=Number(keep.qty)||0;
      g.slice(1).forEach(d=>{qty+=Number(d.qty)||0;if(!keep.image&&d.image)keep.image=d.image;cloudDelProduct(d.id);DB.products=DB.products.filter(x=>x.id!==d.id);removed++;});
      keep.qty=qty;cloudPutProduct(keep);
    });
    save();toast(`تم دمج وحذف ${removed} نسخة مكرّرة`,'ok');render();
  });
}

function importCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.txt,.xlsx,.xls';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;
    const ext=(f.name.split('.').pop()||'').toLowerCase();
    if(ext==='xlsx'||ext==='xls'){
      toast('جارٍ قراءة ملف Excel...','ok');
      loadSheetJS(ok=>{
        if(!ok){toast('تعذّر تحميل أداة Excel (تحقّق من الإنترنت) — يمكنك الحفظ كـ CSV','err');return;}
        const r=new FileReader();
        r.onload=()=>{try{
          const wb=XLSX.read(new Uint8Array(r.result),{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          importRows(rows.filter(rr=>rr&&rr.some(x=>String(x).trim())));
        }catch(e){toast('تعذّرت قراءة ملف Excel','err');}};
        r.readAsArrayBuffer(f);
      });
      return;
    }
    const r=new FileReader();
    r.onload=()=>{const lines=r.result.split(/\r?\n/).filter(l=>l.trim());
      importRows(lines.map(l=>l.split(/[,;\t]/)));};
    r.readAsText(f,'UTF-8');};
  inp.click();
}

const BC_PAT=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128widths(text){
  text=String(text).replace(/[^\x20-\x7e]/g,'');if(!text)return'';
  let codes=[104];for(const ch of text)codes.push(ch.charCodeAt(0)-32);
  let sum=104;for(let i=1;i<codes.length;i++)sum+=codes[i]*i;
  codes.push(sum%103);codes.push(106);
  return codes.map(c=>BC_PAT[c]).join('');
}
function barcodeSVG(text,h){
  const w=code128widths(text);if(!w)return'';h=h||52;const unit=2;let x=0,rects='';
  for(let i=0;i<w.length;i++){const wd=+w[i]*unit;if(i%2===0)rects+=`<rect x="${x}" y="0" width="${wd}" height="${h}" fill="#111"/>`;x+=wd;}
  return `<svg width="${x}" height="${h}" viewBox="0 0 ${x} ${h}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%">${rects}</svg>`;
}

/* --- صور المنتجات (تصغير تلقائي) --- */
function downscaleImage(file,cb){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=440;let wd=img.width,ht=img.height;
    if(wd>ht&&wd>max){ht=ht*max/wd;wd=max;}else if(ht>max){wd=wd*max/ht;ht=max;}
    const c=document.createElement('canvas');c.width=wd;c.height=ht;
    c.getContext('2d').drawImage(img,0,0,wd,ht);
    cb(c.toDataURL('image/jpeg',0.72));
  };img.onerror=()=>cb(null);img.src=r.result;};
  r.onerror=()=>cb(null);r.readAsDataURL(file);
}

let _scanStream=null,_scanCb=null;

  modal({title:'مسح الباركود',body:`
    ${supported?`<div style="background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;display:grid;place-items:center">

      :`<p class="muted" style="font-size:13.5px;margin-bottom:12px">المسح بالكاميرا غير مدعوم هنا (يتطلب كروم على أندرويد وعبر رابط آمن). أدخل الكود يدوياً:</p>`}
    <div class="field" style="margin-top:10px"><label>أو أدخل الكود يدوياً</label>
      <input class="inp" id="scanManual" placeholder="اكتب كود المنتج" onkeydown="if(event.key==='Enter'){_scanDone(this.value)}"></div>`,
    actions:[{label:'بحث',primary:true,fn:()=>{const v=val('scanManual').trim();if(v)_scanDone(v);return false;}},{label:'إغلاق',fn:()=>{_scanStop();return true;}}]});
  if(supported)_scanStart();
}
async function _scanStart(){
  try{
    const det=new window.BarcodeDetector();
    _scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scanVid');if(!v){_scanStop();return;}
    v.srcObject=_scanStream;await v.play();
    const tick=async()=>{
      if(!_scanStream)return;
      try{const codes=await det.detect(v);if(codes&&codes.length){_scanDone(codes[0].rawValue);return;}}catch(e){}
      requestAnimationFrame(tick);
    };requestAnimationFrame(tick);
  }catch(e){toast('تعذّر فتح الكاميرا — أدخل الكود يدوياً','err');}
}
function _scanStop(){if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}}
function _scanDone(code){_scanStop();closeModal();const cb=_scanCb;_scanCb=null;if(cb&&code)cb(String(code).trim());}

  return _mnet;
}
function _imgFrom(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function _embed(src){
  const img=await _imgFrom(src);
  const t=tf.tidy(()=>_mnet.infer(img,true));
  const d=await t.data();t.dispose();return Float32Array.from(d);
}
function _cosine(a,b){let d=0,na=0,nb=0;for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-8);}
async function _rankByImage(querySrc,onProg){
  await ensureVisionModel();
  const q=await _embed(querySrc);
  const withImg=DB.products.filter(p=>p.image);
  const res=[];
  for(let i=0;i<withImg.length;i++){
    const p=withImg[i];let c=_embCache[p.id];
    if(!c||c.sig!==p.image.length){c={sig:p.image.length,emb:await _embed(p.image)};_embCache[p.id]=c;}
    res.push({p,score:_cosine(q,c.emb)});
    onProg&&onProg(i+1,withImg.length);
  }
  res.sort((a,b)=>b.score-a.score);return res;
}
let _aiCtx='store';
function openImageSearch(ctx){
  _aiCtx=ctx||'store';
  const haveImgs=DB.products.filter(p=>p.image).length;
  modal({title:'البحث بصورة (ذكاء اصطناعي)',size:'lg',body:`
    <input type="file" id="aiFile" accept="image/*" class="hidden" onchange="aiImagePick(this)">
    ${haveImgs?`
    <div id="aiPick" style="text-align:center;padding:10px 0 4px">
      <button class="btn btn-primary" style="padding:12px 24px" onclick="document.getElementById('aiFile').click()">${svg(I.search,17)} اختر صورة من معرض الهاتف أو التقطها</button>
      <p class="muted" style="font-size:13px;margin-top:10px">سيقارن الذكاء الاصطناعي صورتك بصور منتجاتك (${haveImgs} منتج بصورة) ويعرض الأقرب شبهاً.<br>يتطلب اتصال إنترنت عند أول استخدام لتحميل النموذج.</p>
    </div>
    <div id="aiQuery"></div>
    <div id="aiResults"></div>`
    :`<div class="empty">${svg(I.box,42)}<b>لا توجد صور للمنتجات بعد</b>أضف صوراً للمنتجات من صفحة المنتجات أولاً، ثم استخدم البحث بالصورة.</div>`}
  `,actions:[{label:'إغلاق',fn:()=>true}]});
}
function aiImagePick(input){
  const f=input.files[0];if(!f)return;
  downscaleImage(f,async uri=>{
    if(!uri){toast('تعذّر قراءة الصورة','err');return;}
    const pick=document.getElementById('aiPick');if(pick)pick.style.display='none';
    document.getElementById('aiQuery').innerHTML=`<div style="text-align:center;margin:6px 0 14px">
      <img src="${uri}" style="width:120px;height:120px;object-fit:cover;border-radius:14px;border:1px solid var(--line)"></div>`;
    const r=document.getElementById('aiResults');
    r.innerHTML=`<div class="empty" id="aiProg">${svg(I.search,40)}<b>جارٍ التحليل...</b><span id="aiProgTxt">تحميل النموذج</span></div>`;
    try{
      const ranked=await _rankByImage(uri,(i,n)=>{const t=document.getElementById('aiProgTxt');if(t)t.textContent=`مطابقة ${i} من ${n}`;});
      renderAIResults(ranked.slice(0,8));
    }catch(e){
      r.innerHTML=`<div class="empty">${svg(I.alert,40)}<b>تعذّر تشغيل البحث البصري</b>يتطلب اتصال إنترنت لتحميل نموذج الذكاء الاصطناعي. تأكد من الاتصال وحاول مجدداً.</div>`;
    }
    input.value='';
  });
}
function renderAIResults(list){
  const r=document.getElementById('aiResults');if(!r)return;
  if(!list.length){r.innerHTML=`<div class="empty">لا نتائج</div>`;return;}
  r.innerHTML=`<div class="muted" style="font-size:13px;margin:4px 0 10px">أقرب المنتجات شبهاً:</div>`+
    list.map(({p,score})=>{const pct=Math.round(score*100);return `
    <div class="row-line">
      <span style="width:46px;height:46px;border-radius:10px;flex:0 0 auto;background:#f1f5f9 center/cover no-repeat;background-image:url(${p.image})"></span>
      <div style="flex:1"><b style="font-size:14px">${esc(p.name)}</b>
        <div class="muted" style="font-size:12px">${esc(p.category)} · ${esc(p.code||'')}</div></div>
      <div style="text-align:end">
        <div style="font-weight:800;color:${pct>=70?'var(--success)':pct>=50?'var(--warn)':'var(--muted)'};font-size:13px">${pct}%</div>
        <div style="font-weight:800;color:var(--primary-d);font-size:13px">${money(p.price)} ${CUR()}</div>
      </div>
      ${_aiCtx==='store'?`<button class="btn btn-primary btn-sm" ${p.qty<=0?'disabled':''} onclick="addToCartStore('${p.id}')">${svg(I.plus,15)}</button>`
        :`<button class="btn btn-sm" onclick="closeModal();editProduct('${p.id}')">${svg(I.edit,15)}</button>`}
    </div>`;}).join('');
}


/* ====================== Modal / helpers ====================== */
function val(id){const e=document.getElementById(id);return e?e.value:'';}
function modal({title,body,actions,size}){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal ${size==='lg'?'lg':''}">
      <div class="modal-h"><h3>${title}</h3><div class="spacer" style="flex:1"></div>
        <button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div>
      <div class="modal-b">${body}</div>
      <div class="modal-f" id="modalActions"></div>
    </div></div>`;
  const af=document.getElementById('modalActions');
  (actions||[]).forEach((a,idx)=>{
    const b=document.createElement('button');
    b.className='btn '+(a.primary?'btn-primary':'');
    b.innerHTML=(a.icon?svg(a.icon,16):'')+a.label;
    b.onclick=()=>{const close=a.fn?a.fn():true;if(close!==false)closeModal();};
    af.appendChild(b);
  });
  const first=root.querySelector('input,select,textarea');if(first)setTimeout(()=>first.focus(),50);
  document.body.classList.add('modal-lock');
}
function closeModal(){document.body.classList.remove('modal-lock');document.getElementById('modalRoot').innerHTML='';}
function confirmDlg(title,msg,onYes){
  modal({title,body:`<p style="font-size:14.5px;color:var(--muted)">${msg}</p>`,
    actions:[{label:'نعم، تأكيد',primary:true,fn:()=>{onYes();}},{label:'إلغاء',fn:()=>true}]});
}
function printEl(id){
  const node=document.getElementById(id);if(!node)return;
  const w=window.open('','','width=820,height=700');
  w.document.write(`<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>طباعة</title>
    <style>@page{size:A4;margin:14mm}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body{font-family:Tajawal,Arial,sans-serif;padding:0;margin:0;color:#0f172a;filter:grayscale(1) contrast(1.12) brightness(.96)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    .muted{color:#666}.t-num{font-variant-numeric:tabular-nums}.badge{padding:2px 6px}
    .cards,.card{display:inline-block;border:1px solid #ddd;border-radius:8px;padding:8px 14px;margin:4px}
    .label{font-size:12px;color:#666;display:block}.val{font-size:18px;font-weight:700}</style></head>
    <body>${node.innerHTML}</body></html>`);
  w.document.close();w.focus();setTimeout(()=>{w.print();w.close();},300);
}

let LANG=DB.settings.lang||'ar';
function t(k){return (L[LANG]&&L[LANG][k])||L.ar[k]||k;}
function catLabel(c){return LANG==='fr'?(CAT_FR[c]||c):c;}
function applyLang(){
  document.documentElement.lang=LANG;
  document.documentElement.dir=LANG==='fr'?'ltr':'rtl';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-ph'));});
  const lb=document.getElementById('langBtn');if(lb)lb.textContent=LANG==='fr'?'ع':'FR';
  if(typeof updateMenuIdentity==='function')updateMenuIdentity();
  renderStore();
  if(!window._welcomed){window._welcomed=true;setTimeout(()=>toast(greetMsg()),500);}
}
function greetMsg(){const n=DB.settings.guestName;return n?`${t('hello')} ${n}`:t('helloGuest');}
function setGuestName(){
  modal({title:t('yourName'),body:`
    <p class="muted" style="margin-bottom:12px;font-size:13.5px">${t('nameHint')}</p>
    <div class="field"><label>${t('yourName')}</label><input class="inp" id="gn" value="${esc(DB.settings.guestName||'')}" placeholder="${t('namePh')}"></div>`,
    actions:[{label:t('save'),primary:true,fn:()=>{
      DB.settings.guestName=val('gn').trim();save();
      const mn=document.querySelector('.menu-name');if(mn)mn.textContent=DB.settings.guestName||t('menuGuest');
      if(DB.settings.guestName)toast(greetMsg(),'ok');return true;
    }},{label:t('close'),fn:()=>true}]});
}
function toggleLang(){LANG=LANG==='fr'?'ar':'fr';DB.settings.lang=LANG;save();applyLang();}

let _rec=null;
function startVoiceSearch(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast(t('voiceNo'),'err');return;}
  const mic=document.getElementById('micBtn');
  try{
    _rec=new SR();_rec.lang=LANG==='fr'?'fr-FR':'ar-SA';_rec.interimResults=false;_rec.maxAlternatives=1;
    if(mic)mic.classList.add('rec');toast(t('listening'));
    _rec.onresult=e=>{const txt=e.results[0][0].transcript;const inp=document.getElementById('storeQ');
      if(inp){inp.value=txt;renderStoreGrid();scrollToProducts();}};
    _rec.onerror=()=>{if(mic)mic.classList.remove('rec');};
    _rec.onend=()=>{if(mic)mic.classList.remove('rec');};
    _rec.start();
  }catch(err){if(mic)mic.classList.remove('rec');toast(t('voiceNo'),'err');}
}

let storeCat='';

function showStore(){
  document.getElementById('adminUI').classList.add('hidden');
  document.getElementById('storefront').classList.remove('hidden');
  document.getElementById('storeNav').classList.remove('hidden');
  applyDark();applyLang();window.scrollTo(0,0);
  setTimeout(syncVisitorVerification,1500);
  if(!getVisitor()&&!window._regPrompted){window._regPrompted=true;setTimeout(()=>{if(!getVisitor()&&document.getElementById('storefront')&&!document.getElementById('storefront').classList.contains('hidden'))visitorRegister();},1300);}
}
function showAdmin(){
  if(!CUR_USER){adminLogin();return;}
  document.getElementById('storefront').classList.add('hidden');
  document.getElementById('storeNav').classList.add('hidden');
  closeCart();
  document.documentElement.dir='rtl';document.documentElement.lang='ar';
  document.getElementById('adminUI').classList.remove('hidden');
  applyDark();
  const rb=document.getElementById('roleBadge');if(rb)rb.textContent=`${CUR_USER.name} · ${CUR_USER.role}`;
  buildNav();
  go(allowedPages()[0]||'dash');
  window.scrollTo(0,0);
}
function renderStore(){
  _topSellers=null;
  const l=document.getElementById('sfLogo');if(l)l.style.backgroundImage=`url(${LOGO})`;
  renderCats();renderDeals();renderCatTabs();renderStoreGrid();renderFooter();updateCartBadge();
}
function renderCats(){
  const el=document.getElementById('catRow');if(!el)return;
  const all=`<button class="cat-item" onclick="storeCat='';renderCats();renderCatTabs();renderStoreGrid();scrollToProducts()">
    <span class="cat-tile ${storeCat===''?'on':''}">${svg(I.store,26)}</span><span class="cat-label">${t('all')}</span></button>`;
  el.innerHTML=all+DB.categories.map(c=>`
    <button class="cat-item" onclick="storeCat='${esc(c)}';renderCats();renderCatTabs();renderStoreGrid();scrollToProducts()">
      <span class="cat-tile ${storeCat===c?'on':''}">${svg(CAT_ICONS[c]||I.box,26)}</span>
      <span class="cat-label">${esc(catLabel(c))}</span>
    </button>`).join('');
}
function renderCatTabs(){
  const el=document.getElementById('catTabs');if(!el)return;
  const tab=(c,label)=>`<button class="cat-tab ${storeCat===c?'on':''}" onclick="storeCat='${esc(c)}';renderCatTabs();renderCats();renderStoreGrid()">${esc(label)}</button>`;
  el.innerHTML=tab('',t('all'))+DB.categories.map(c=>tab(c,catLabel(c))).join('');
}
function renderDeals(){
  const el=document.getElementById('dealRow');if(!el)return;
  const instock=DB.products.filter(p=>p.qty>0);
  const list=instock.slice().sort((a,b)=>discPct(b)-discPct(a)).slice(0,10);
  if(!list.length){document.getElementById('dealsSec').style.display='none';return;}
  document.getElementById('dealsSec').style.display='';
  el.innerHTML=list.map(p=>{const dp=discPct(p);const img=prodImg(p);return`
    <div class="deal-card" style="cursor:pointer" onclick="openProductDetail('${p.id}')">
      <div class="deal-img" ${img?`style="background-image:url(${img})"`:''}>${img?'':svg(I.box,30)}
        <span class="deal-price">${money(p.price)} ${CUR()}</span>${dp?`<span class="disc-badge">-${dp}%</span>`:''}</div>
      <div class="deal-info"><div class="deal-name">${esc(pName(p))}</div><div class="deal-tag">${dp?'-'+dp+'% '+t('off'):t('bestPrice')}</div></div>
    </div>`;}).join('');
}

function cardCtrl(p,out){
  if(out)return `<button class="prod-add" disabled>${svg(I.plus,16)}</button>`;
  const q=cartQtyOf(p.id);
  if(q>0)return `<div class="card-step" onclick="event.stopPropagation()"><button onclick="stepCart('${p.id}',-1)">−</button><b>${q}</b><button onclick="stepCart('${p.id}',1)">+</button></div>`;
  return `<button class="prod-add" onclick="event.stopPropagation();addToCartStore('${p.id}')" aria-label="add">${svg(I.plus,16)}</button>`;
}
function renderStoreGrid(){
  const el=document.getElementById('storeGrid');if(!el)return;
  const q=normAr(document.getElementById('storeQ')?.value||'');
  document.getElementById('prodSecTitle').textContent=storeCat?catLabel(storeCat):t('allProducts');
  let list=DB.products.filter(p=>{
    if(storeCat&&p.category!==storeCat)return false;
    if(q){const hay=normAr([p.name,p.nameFr,p.code,p.category,p.desc].join(' '));if(!hay.includes(q))return false;}
    return true;
  });
  if(!list.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">${svg(I.box,42)}<b>${t('noProducts')}</b></div>`;return;}
  el.innerHTML=list.map(p=>{const out=p.qty<=0;const dp=discPct(p);const tag=productTag(p);const img=prodImg(p);return`
    <div class="prod-card" style="cursor:pointer" onclick="openProductDetail('${p.id}')">
      <div class="prod-img" ${img?`style="background-image:url(${img})"`:''}>${img?'':svg(I.box,30)}
        <span class="prod-badge">${money(p.price)} ${CUR()}</span>
        ${out?`<span class="prod-out">${t('out')}</span>`:(tag?`<span class="ptag ${tag.cls}">${tag.text}</span>`:'')}
        ${dp?`<span class="disc-badge">-${dp}%</span>`:''}
        <button class="fav-btn ${isFav(p.id)?'on':''}" onclick="event.stopPropagation();favToggle('${p.id}')" aria-label="fav">${svg(I.heart,17)}</button></div>
      <div class="prod-info">
        <div class="prod-cat">${esc(catLabel(p.category))}</div>
        <div class="prod-name">${esc(pName(p))}</div>
        <div class="prod-foot">
          <div class="prod-price">${money(p.price)} <small>${CUR()}</small>${dp?`<s class="old-price">${money(p.oldPrice)}</s>`:''}</div>
          ${cardCtrl(p,out)}
        </div>
      </div>
    </div>`;}).join('');
}
function stepCart(id,d){
  const p=DB.products.find(x=>x.id===id);
  const line=CART.find(c=>c.id===id);
  if(line){line.qty+=d;if(line.qty<=0)CART.splice(CART.indexOf(line),1);}
  else if(d>0&&p)CART.push({id,name:p.name,price:p.price,qty:1});
  saveCart();updateCartBadge();renderStoreGrid();renderDeals();
  const cd=document.getElementById('cartDrawer');if(cd&&cd.classList.contains('open'))renderStoreCart();
}
function favToggle(id){toggleFav(id);renderStoreGrid();renderDeals();
  const fb=document.getElementById('pdFav');if(fb)fb.classList.toggle('on',isFav(id));}
function payIcon(name){
  const n=name.toLowerCase();
  if(/نقد|cash/.test(n))return I.wallet;
  if(/بطاقة|visa|master|فيزا|ماستر|card/.test(n))return I.card;
  if(/تحويل|حوالة|transfer/.test(n))return I.transfer;
  return I.wallet;
}

function submitOrder(ctx){
  let payMode=_payMode,deposit=0,appBox=null,payNum='';
  if(payMode!=='cod'){
    appBox=payApps().find(b=>b.id===_payApp);
    if(!appBox){toast('اختر تطبيق الدفع','err');return false;}
    payNum=appBox.payNum||DB.settings.payNumber||'';
    if(payMode==='full')deposit=ctx.grandTotal;
    else{deposit=parseFloat(val('co_deposit'))||0;if(deposit<=0){toast('أدخل المبلغ المدفوع مقدّماً','err');return false;}if(deposit>=ctx.grandTotal){payMode='full';deposit=ctx.grandTotal;}}
  }
  const v=getVisitor()||{};
  if(DB.seq&&!DB.seq.order)DB.seq.order=1;
  const no=DB.seq?DB.seq.order:Math.floor(Date.now()/1000);if(DB.seq)DB.seq.order++;
  const o={id:uid('ord'),no,date:new Date().toISOString(),
    customerId:v.id||regKey(ctx.cc,ctx.phone),name:ctx.name,cc:ctx.cc,phone:ctx.phone,addr:ctx.addr||'',coords:ctx.coords||null,note:ctx.note||'',
    items:CART.map(l=>({id:l.id,name:l.name,price:l.price,qty:l.qty})),
    itemsTotal:ctx.itemsTotal,delivery:ctx.delivery,total:ctx.grandTotal,
    payMode,payApp:appBox?appBox.name:'',payAppId:appBox?appBox.id:'',payNum,deposit,remaining:ctx.grandTotal-deposit,
    proof:_payProof||'',status:'pending'};
  DB.orders=DB.orders||[];DB.orders.push(o);save();
  cloudAddOrder(o).catch(()=>{});
  sendOrderWa(ctx,o);
  setTimeout(()=>orderReviewScreen(o),80);
  return true;
}

function sendOrderWa(ctx,o){
  let txt='*'+t('orderMsg')+'* (#'+o.no+')\n\n';
  txt+=`*${t('coCustomer')}:* ${o.name}\n*${t('coPhone')}:* +${o.cc} ${o.phone}\n`;
  if(o.addr)txt+=`*${t('coAddr')}:* ${o.addr}\n`;
  txt+=`\n*${t('coItems')}:*\n`;
  o.items.forEach(l=>{txt+=`• ${l.name} — ${l.qty} × ${money(l.price)} = ${money(l.price*l.qty)} ${CUR()}\n`;});
  txt+=`الحمل: ${money(o.delivery)} ${CUR()}\n`;
  txt+=`\n*${t('orderTotal')}: ${money(o.total)} ${CUR()}*\n`;
  if(o.payMode==='cod')txt+='💵 الدفع عند الاستلام\n';
  else{txt+=`💳 ${o.payMode==='partial'?'دفع جزئي':'دفع كامل'} عبر ${o.payApp} — الرقم: ${o.payNum}\nمدفوع: ${money(o.deposit)} ${CUR()}`;if(o.remaining>0)txt+=` · الباقي عند الاستلام: ${money(o.remaining)} ${CUR()}`;txt+='\n';}
  if(o.coords)txt+=`\n*${t('coLocLabel')}:* https://maps.google.com/?q=${o.coords.lat},${o.coords.lng}\n`;
  if(o.note)txt+=`\n*${t('coNote')}:* ${o.note}\n`;
  if(o.proof)txt+=`\n${t('coProofNote')}\n`;
  const num=ctx.num;
  const sendLink=()=>window.open(`https://wa.me/${num}?text=${encodeURIComponent(txt)}`,'_blank');
  if(o.proof&&navigator.canShare){fetch(o.proof).then(r=>r.blob()).then(blob=>{const file=new File([blob],'payment.jpg',{type:blob.type||'image/jpeg'});if(navigator.canShare({files:[file]})){navigator.share({text:txt,files:[file]}).catch(()=>sendLink());}else sendLink();}).catch(()=>sendLink());}else sendLink();
  toast('تم إرسال طلبك','ok');
}

function watchVerification(){
  if(!FS)return;
  const v=getVisitor();
  if(!v||!v.id||v.verified)return;
  if(window._verWatch){try{window._verWatch();}catch(e){}window._verWatch=null;}
  try{
    window._verWatch=FS.collection('registrations').doc(String(v.id)).onSnapshot(d=>{
      const reg=d&&d.exists?d.data():null;
      if(reg&&reg.verified){
        const cur=getVisitor();
        if(cur&&!cur.verified){cur.verified=true;if(reg.name)cur.name=reg.name;if(reg.image)cur.image=reg.image;setVisitor(cur);updateMenuIdentity();notifyVerified(cur.name);}

      }
    },e=>{});
  }catch(e){}
}

      • <b style="color:#7c3aed">الصاحب</b>: كل الأقسام + إدارة المستخدمين.<br>

      • <b style="color:#0891b2">المحاسب</b>: لوحة التحكم، العملاء، الموردون، السندات، المصروفات، الصندوق، التقارير.<br>
      • <b style="color:#16a34a">المسيّر</b>: المتجر، المخزون، المخازن، فاتورة بيع، فاتورة شراء.
    </div></div>`;
}
function togglePass(btn){const s=btn.parentElement.querySelector('.pass-cell');if(!s)return;const showing=s.dataset.show==='1';s.textContent=showing?'••••••':s.dataset.p;s.dataset.show=showing?'':'1';}
function editUser(id){
  const u=id?DB.users.find(x=>x.id===id):{name:'',username:'',pass:'',role:'مسيّر',email:''};
  modal({title:id?'تعديل مستخدم':'مستخدم جديد',body:`
    <div class="field"><label>الاسم</label><input class="inp" id="u_name" value="${esc(u.name)}"></div>
    <div class="field" style="margin-top:10px"><label>اسم الدخول (محلي)</label><input class="inp" id="u_user" value="${esc(u.username)}" placeholder="بالأحرف اللاتينية مثل staff7" autocapitalize="off"></div>
    <div class="field" style="margin-top:10px"><label>كلمة المرور (محلية)</label><input class="inp" id="u_pass" value="${esc(u.pass)}"></div>
    <div class="field" style="margin-top:10px"><label>البريد الإلكتروني (للدخول الآمن)</label><input class="inp" id="u_email" type="email" value="${esc(u.email||'')}" placeholder="بريد حساب Firebase للموظّف" autocapitalize="off"></div>
    <div class="field" style="margin-top:10px"><label>الدور</label><select class="inp" id="u_role">${ROLE_LIST.map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
    <p class="muted" style="font-size:11.5px;margin-top:10px">للدخول الآمن: أنشئ حساباً للموظّف في Firebase (Authentication ← Add user) بنفس هذا البريد، واختر دوره هنا.</p>`,
    actions:[{label:'حفظ',primary:true,fn:()=>{
      const name=val('u_name').trim(),us=val('u_user').trim(),pass=val('u_pass').trim(),role=val('u_role'),email=(val('u_email')||'').trim().toLowerCase();
      if(!name||!us||!pass){toast('أكمل الاسم واسم الدخول وكلمة المرور','err');return false;}
      if(DB.users.some(x=>x.username===us&&x.id!==(id||'')) ){toast('اسم الدخول مستخدم','err');return false;}
      if(id)Object.assign(u,{name,username:us,pass,role,email});
      else{u.id=uid('u');Object.assign(u,{name,username:us,pass,role,email});DB.users.push(u);}
      if(email)cloudPutStaff({email,role,name}).catch(()=>{});
      save();toast('تم الحفظ','ok');render();return true;
    }},{label:'إلغاء',fn:()=>true}]});
}
function delUser(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  if(u.role==='صاحب'){toast('لا يمكن حذف الصاحب','err');return;}
  if(CUR_USER&&u.id===CUR_USER.id){toast('لا يمكن حذف حسابك الحالي','err');return;}
  confirmDlg(`حذف الموظف "${esc(u.name)}"؟`,'سيفقد إمكانية الدخول.',()=>{if(u.email)cloudDelStaff(u.email);DB.users=DB.users.filter(x=>x.id!==id);save();toast('تم الحذف','ok');render();});
}
function logout(){CUR_USER=null;if(AUTH&&AUTH.currentUser){try{AUTH.signOut();}catch(e){}}showStore();toast('تم تسجيل الخروج','ok');}
function quickPinLogin(){
  const pin=(val('adm_pin')||'').trim();
  if(!pin){toast('أدخل الرمز','err');return;}
  if(pin===String(DB.settings.quickPin||'')){
    const u=DB.users.find(x=>x.role==='مدير')||DB.users.find(x=>x.username==='manager');
    if(u){CUR_USER=u;closeModal();toast('مرحباً '+u.name,'ok');showAdmin();return;}
  }
  toast('الرمز غير صحيح','err');
}
function firebaseLogin(){
  const email=(val('adm_email')||'').trim();const pass=val('adm_fpass')||'';
  if(!email||!pass){toast('أدخل البريد وكلمة السر','err');return;}
  if(!AUTH){toast('المصادقة غير مهيّأة (تحقّق من الإنترنت)','err');return;}
  toast('جارٍ الدخول الآمن...','ok');
  AUTH.signInWithEmailAndPassword(email,pass).then(cred=>{
    const finish=u=>{CUR_USER=u;toast('مرحباً '+(u?u.name:'')+' (دخول آمن ✔)','ok');closeModal();showAdmin();};
    const local=DB.users.find(x=>x.email&&x.email.toLowerCase()===email.toLowerCase());
    if(local){finish(local);return;}
    const p=cloudGetStaff(email);
    if(p&&p.then){p.then(s=>{
      if(s&&s.role){finish({id:'fb_'+staffKey(email),name:s.name||email,username:email,email:staffKey(email),role:s.role});}
      else{const own=DB.users.find(x=>x.role==='صاحب')||DB.users[0];finish(own);}
    }).catch(()=>{const own=DB.users.find(x=>x.role==='صاحب')||DB.users[0];finish(own);});}
    else{const own=DB.users.find(x=>x.role==='صاحب')||DB.users[0];finish(own);}
  }).catch(err=>{
    const c=(err&&err.code)||'';
    let m='تعذّر الدخول';
    if(c.includes('user-not-found'))m='لا يوجد حساب بهذا البريد — أنشئه في Firebase';
    else if(c.includes('wrong-password')||c.includes('invalid-credential'))m='كلمة السر غير صحيحة';
    else if(c.includes('invalid-email'))m='صيغة البريد غير صحيحة';
    else if(c.includes('network'))m='لا اتصال بالإنترنت';
    toast(m,'err');
  });
}
function adminLogin(){
  modal({title:'تسجيل الدخول',body:`
    <div class="quick-login" style="background:var(--primary-soft);border-radius:12px;padding:12px">
      <label style="font-weight:700;font-size:13.5px">🔒 دخول آمن (بريد وكلمة سر)</label>
      <div class="field" style="margin-top:8px"><input class="inp" id="adm_email" type="email" placeholder="البريد الإلكتروني" autocapitalize="off" autocomplete="username"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="inp" id="adm_fpass" type="password" placeholder="كلمة السر" autocomplete="current-password" style="flex:1" onkeydown="if(event.key==='Enter')firebaseLogin()">
        <button class="btn btn-primary" onclick="firebaseLogin()">دخول</button>
      </div>
    </div>
    <div class="login-or"><span>أو دخول سريع كمدير</span></div>
    <div class="quick-login">
      <div style="display:flex;gap:8px">
        <input class="inp" id="adm_pin" type="password" inputmode="numeric" placeholder="الرمز السريع" autocomplete="off" style="flex:1" onkeydown="if(event.key==='Enter')quickPinLogin()">
        <button class="btn" onclick="quickPinLogin()">دخول</button>
      </div>
    </div>
    <div class="login-or"><span>أو بالاسم وكلمة المرور</span></div>
    <div class="field"><label>اسم الدخول</label><input class="inp" id="adm_user" placeholder="owner / manager / staff1..." autocapitalize="off" autocomplete="off"></div>
    <div class="field"><label>كلمة المرور</label><input class="inp" id="adm_pass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')document.getElementById('admGoBtn').click()"></div>`,
    actions:[
      {label:'دخول',primary:true,fn:()=>{
        const us=(val('adm_user')||'').trim();const pass=val('adm_pass')||'';
        if(!us&&!pass){toast('استخدم الدخول الآمن أو الرمز السريع أعلاه','err');return false;}
        const u=DB.users.find(x=>x.username===us&&x.pass===pass);
        if(u){CUR_USER=u;toast('مرحباً '+u.name,'ok');showAdmin();return true;}
        toast('بيانات الدخول غير صحيحة','err');return false;
      }},
      {label:'إلغاء',fn:()=>true}
    ]});
  setTimeout(()=>{const b=document.querySelectorAll('#modalActions .btn')[0];if(b)b.id='admGoBtn';const em=document.getElementById('adm_email');if(em)em.focus();},30);
}

/* ====================== تشغيل ====================== */
buildNav();
if(!DB.settings.brands)DB.settings.brands=['INGCO','Total','Stanley','Bosch','دباس'];
if(DB.settings.adminPass===undefined)DB.settings.adminPass='admin';
if(DB.settings.quickPin===undefined)DB.settings.quickPin='1234';
setLogos();
setFavicon();
CART=loadCart();
applyDark();
window.addEventListener('scroll',()=>{const b=document.getElementById('toTop');if(b)b.classList.toggle('show',window.scrollY>500);});
showStore();
cloudInit();
</script>
</body>
